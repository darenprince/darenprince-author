<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">Amazon Top 100 Bestseller</title>
  <desc id="desc">Gold and black bestseller proof badge for Game On</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset=".25" stop-color="#f7c94b"/>
      <stop offset=".55" stop-color="#d99a24"/>
      <stop offset=".8" stop-color="#ffe37a"/>
      <stop offset="1" stop-color="#b87514"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171a13"/>
      <stop offset=".55" stop-color="#070906"/>
      <stop offset="1" stop-color="#1c2118"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".42"/>
    </filter>
    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M4 12h23M37 21h17M12 48h26M48 60h24M3 72h12" stroke="#fff" stroke-opacity=".045" stroke-width="2"/>
    </pattern>
  </defs>
  <g filter="url(#softShadow)">
    <path d="M30 20h660l-18 44 18 44-18 44 18 44-18 64H30l18-64-18-44 18-44-18-44z" fill="url(#dark)"/>
    <path d="M52 38h616l-13 29 13 41-13 41 13 29-13 64H52l13-64-13-29 13-41-13-41z" fill="none" stroke="url(#gold)" stroke-width="4" stroke-opacity=".72"/>
    <path d="M30 20h660l-18 44 18 44-18 44 18 44-18 64H30l18-64-18-44 18-44-18-44z" fill="url(#grain)" opacity=".9"/>
    <g fill="url(#gold)">
      <path d="M106 88l11 24 26 3-19 17 5 26-23-13-23 13 5-26-19-17 26-3z"/>
      <path d="M614 88l11 24 26 3-19 17 5 26-23-13-23 13 5-26-19-17 26-3z"/>
    </g>
    <text x="360" y="72" text-anchor="middle" fill="#f7f1df" font-family="League Spartan, Arial Black, Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="7">AMAZON</text>
    <text x="360" y="151" text-anchor="middle" fill="url(#gold)" font-family="League Spartan, Arial Black, Arial, sans-serif" font-size="80" font-weight="900" letter-spacing="-2">TOP 100</text>
    <text x="360" y="203" text-anchor="middle" fill="#f7f1df" font-family="League Spartan, Arial Black, Arial, sans-serif" font-size="42" font-weight="900" letter-spacing="6">BESTSELLER</text>
    <path d="M220 224c82 17 199 17 280 0" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  </g>
