<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crown Labs Bible Viewer</title>
<style>
:root{--bg:#0b0b0d;--panel:#141418;--soft:#1a1a20;--soft2:#202028;--text:#f5f5f7;--muted:#9b9ba3;--border:#25252d;--accent:#9c271c;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0b0b0d;color:var(--text);font-family:Inter,SF Pro Display,Segoe UI,sans-serif;line-height:1.65;-webkit-font-smoothing:antialiased;}
.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh;}
aside{border-right:1px solid var(--border);background:#101014;padding:28px;position:sticky;top:0;height:100vh;overflow:auto;}
.brand{margin-bottom:26px;}
.mark{width:48px;height:48px;border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:16px;font-weight:700;background:linear-gradient(145deg,#1b1b21,#101014);}
.brand h1{font-size:1.12rem;letter-spacing:-.03em;}
.brand p{font-size:.86rem;color:var(--muted);margin-top:6px;}
.search{margin:22px 0 30px;}
.search input{width:100%;background:#17171d;border:1px solid var(--border);border-radius:14px;padding:14px 14px;color:var(--text);font-size:.92rem;outline:none;}
.search input:focus{border-color:rgba(156,39,28,.55);}
.nav-section{margin-bottom:22px;}
.nav-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);margin-bottom:12px;}
.nav{display:flex;flex-direction:column;gap:4px;}
.nav a{display:block;color:var(--muted);text-decoration:none;padding:11px 12px;border-radius:12px;font-size:.92rem;transition:background .2s ease,color .2s ease;}
.nav a:hover,.nav a.active{background:var(--soft2);color:var(--text);}
main{padding:56px 58px;max-width:1100px;}
.toolbar{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:36px;padding-bottom:22px;border-bottom:1px solid var(--border);}
.toolbar small{color:var(--muted);font-size:.85rem;}
.badge{padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:#15151a;color:#d6d6da;font-size:.78rem;}
.content h1{font-size:clamp(2.6rem,5vw,5rem);line-height:.92;letter-spacing:-.06em;margin-bottom:26px;}
.content h2{font-size:1.6rem;margin:38px 0 14px;letter-spacing:-.035em;}
.content h3{font-size:1.08rem;margin:28px 0 10px;color:#fff;}
.content p{color:#d8d8dc;margin:0 0 16px;font-size:1rem;}
.content ul{margin:12px 0 24px 24px;color:#d8d8dc;}
.content li{margin:6px 0;}
.content code{background:#17171d;border:1px solid var(--border);border-radius:8px;padding:2px 6px;color:#fff;}
.empty{color:var(--muted);font-size:1rem;}
.footer-note{margin-top:44px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.86rem;}
@media(max-width:980px){.app{grid-template-columns:1fr;}aside{position:relative;height:auto;}main{padding:34px 22px;}.toolbar{display:block;}.badge{display:inline-flex;margin-top:12px;}}
</style>
</head>
<body>
<div class="app">
<aside>
  <div class="brand">
    <div class="mark">CL</div>
    <h1>Crown Labs Bible</h1>
    <p>Institutional infrastructure documentation portal</p>
  </div>

  <div class="search">
    <input id="searchInput" type="text" placeholder="Search documentation..." />
  </div>

  <div id="navRoot"></div>
</aside>

<main>
  <div class="toolbar">
    <div>
      <small id="pathLabel">Select a document</small>
    </div>
    <div class="badge">Institutional Documentation System</div>
  </div>

  <article class="content" id="content">
    <p class="empty">Choose a document from the navigation.</p>
  </article>

  <div class="footer-note">
    Crown Labs Bible · Operational Governance · Infrastructure Philosophy · Institutional Documentation Architecture
  </div>
</main>
</div>

<script>
const docs=[
{category:'Corporate Infrastructure',items:[
['Company Overview','../05-corporate-infrastructure/company-overview.md'],
['Executive Positioning','../05-corporate-infrastructure/executive-positioning.md'],
['Holdings Structure','../05-corporate-infrastructure/holdings-structure.md'],
['Portfolio Governance','../05-corporate-infrastructure/portfolio-governance.md'],
['Writing Standards','../05-corporate-infrastructure/writing-standards.md'],
['Brand Standards','../05-corporate-infrastructure/brand-standards.md'],
['Communication Standards','../05-corporate-infrastructure/communication-standards.md'],
['Ecosystem Philosophy','../05-corporate-infrastructure/ecosystem-philosophy.md'],
['Investor Relations','../05-corporate-infrastructure/investor-relations.md'],
['Licensing Governance','../05-corporate-infrastructure/licensing-governance.md'],
['Expansion Roadmap','../05-corporate-infrastructure/expansion-roadmap.md'],
['Acquisition Strategy','../05-corporate-infrastructure/acquisition-strategy.md']
]}];

const navRoot=document.getElementById('navRoot');
const content=document.getElementById('content');
const pathLabel=document.getElementById('pathLabel');
const searchInput=document.getElementById('searchInput');

function renderNav(filter=''){
 navRoot.innerHTML='';
 docs.forEach(section=>{
   const filtered=section.items.filter(([title])=>title.toLowerCase().includes(filter.toLowerCase()));
   if(!filtered.length) return;

   const wrap=document.createElement('div');
   wrap.className='nav-section';

   const title=document.createElement('div');
   title.className='nav-title';
   title.textContent=section.category;

   const nav=document.createElement('nav');
   nav.className='nav';

   filtered.forEach(([docTitle,path])=>{
     const a=document.createElement('a');
     a.href='#';
     a.textContent=docTitle;
     a.onclick=(e)=>{
       e.preventDefault();
       loadDoc(docTitle,path,a);
     };
     nav.appendChild(a);
   });

   wrap.appendChild(title);
   wrap.appendChild(nav);
   navRoot.appendChild(wrap);
 });
}

function renderMarkdown(md){
 let html='';
 let inList=false;
 md.split('\n').forEach(line=>{
  const t=line.trim();
  if(!t){if(inList){html+='</ul>';inList=false;} return;}
  if(t.startsWith('### ')){if(inList){html+='</ul>';inList=false;} html+='<h3>'+t.slice(4)+'</h3>';return;}
  if(t.startsWith('## ')){if(inList){html+='</ul>';inList=false;} html+='<h2>'+t.slice(3)+'</h2>';return;}
  if(t.startsWith('# ')){if(inList){html+='</ul>';inList=false;} html+='<h1>'+t.slice(2)+'</h1>';return;}
  if(t.startsWith('- ')){if(!inList){html+='<ul>';inList=true;} html+='<li>'+t.slice(2)+'</li>';return;}
  if(inList){html+='</ul>';inList=false;}
  html+='<p>'+t+'</p>';
 });
 if(inList) html+='</ul>';
 return html;
}

async function loadDoc(title,path,el){
 document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
 if(el) el.classList.add('active');
 pathLabel.textContent=path;
 content.innerHTML='<p class="empty">Loading documentation...</p>';
 try{
   const res=await fetch(path);
   const md=await res.text();
   content.innerHTML=renderMarkdown(md);
   location.hash=encodeURIComponent(title);
 }catch(e){
   content.innerHTML='<p class="empty">Unable to load this document from the current path.</p>';
 }
}

searchInput.addEventListener('input',e=>{
 renderNav(e.target.value);
});

renderNav();

const start=decodeURIComponent(location.hash.replace('#',''));
const flat=docs.flatMap(section=>section.items);
const found=flat.find(d=>d[0]===start)||flat[0];

setTimeout(()=>{
 const link=[...document.querySelectorAll('.nav a')].find(a=>a.textContent===found[0]);
 loadDoc(found[0],found[1],link);
},0);
</script>
</body>
</html>
