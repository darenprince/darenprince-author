kind = "web"
previewPath = "/"
title = "Crown Labs"
version = "1.0.0"
id = "artifacts/crown-labs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20730

[services.development]
run = "pnpm --filter @workspace/crown-labs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crown-labs", "run", "build" ]
publicDir = "artifacts/crown-labs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20730"
BASE_PATH = "/"
